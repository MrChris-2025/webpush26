<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScoreAlerts PWA</title>

          
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="hc Scoreboard">

  
  <link rel="manifest" href="/manifest.webmanifest">
</head>
<body>
  <h1>Live Score Alerts</h1>
  <div id="game-list">
    <p>Loading live matches...</p>
  </div>
  <button id="subscribe-btn" style="display:none;">Enable Game Alerts</button>

  <!-- Insert this inside the <body> of your index.html -->
<div class="notification-panel" style="padding: 20px; border: 1px solid #ccc; border-radius: 8px; margin: 20px 0;">
  <h3>Live Updates</h3>
  <p>Never miss a play. Turn on live alerts for game-day scores.</p>
  
  <!-- The toggle button that controls the browser prompt -->
  <button id="subscribe-btn" disabled>Loading live system...</button>
</div>


  

  <script src="/app.js"></script>
</body>
</html>
