<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hc | Sports</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="manifest" href="manifest.json">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100;400;700;900&display=swap');
        
        :root {
            --bg-dark: #141515;
            --card-bg: rgba(20, 20, 25, 0.4);
            --accent: #dc2626;
        }

        body, button, input, select, textarea {
            font-family: 'Poppins', sans-serif !important;
        }

        body {
            background-color: var(--bg-dark);
            color: #f3f4f6;
            overflow: hidden;
            overscroll-behavior: none;
            user-select: none;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .logo-text { font-weight: 100; letter-spacing: -1px; }
        .logo-text b { font-weight: 900; }

        .match-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.15s ease-out, background-color 0.15s ease-out, box-shadow 0.15s ease-out;
            outline: none;
        }

        .match-card:hover, .match-card:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
            outline: none;
            z-index: 5;
        }

        .glass {
            background: rgba(10, 10, 12, 0.9) !important;
            border-color: rgba(255, 255, 255, 0.08) !important;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-bottom-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #playerModal {
            width: 98%;
            max-width: 1200px;
            background: rgba(15, 15, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        button:focus {
            outline: 2px solid var(--accent);
            background: rgba(220, 38, 38, 0.3) !important;
        }

        #sports-toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 420px;
            width: calc(100% - 48px);
        }

        .toast-avatar {
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 18px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: toastSlideIn 0.4s ease-out forwards;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .toast-avatar:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .toast-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #ef4444;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.1);
        }

        .toast-icon-wrapper svg, .toast-icon-wrapper i {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toast-dismiss-btn {
            position: absolute;
            top: 12px;
            right: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: #9ca3af;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toast-dismiss-btn:hover {
            color: #ffffff;
            background: rgba(220, 38, 38, 0.6);
            border-color: transparent;
        }

        .toast-progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3.5px;
            background: linear-gradient(90deg, var(--accent), #f87171);
            width: 100%;
            animation: shrink 10s linear forwards;
            box-shadow: 0 0 8px var(--accent);
        }

        @keyframes toastSlideIn {
            from { transform: translateX(120%) scale(0.9); opacity: 0; }
            to { transform: translateX(0) scale(1); opacity: 1; }
        }

        @keyframes shrink {
            from { width: 100%; }
            to { width: 0%; }
        }

        .diamond-base { width: 10px; height: 10px; transform: rotate(45deg); border: 1px solid rgba(255,255,255,0.4); background: transparent; transition: background 0.3s; }
        .diamond-base.active { background: #ef4444; border-color: #ef4444; box-shadow: 0 0 6px #ef4444; }
        
        .toggle-checkbox:checked + .toggle-label {
            background-color: #ef4444;
        }
        .toggle-checkbox:checked + .toggle-label .toggle-dot {
            transform: translateX(100%);
        }
    </style>
</head>
<body class="selection:bg-red-600 selection:text-white flex flex-col h-screen">

    <div class="pt-16 flex flex-1 overflow-hidden">

            <div class="p-4 space-y-8">
                <div>
                    <div class="space-y-1">
                        <button id="sideBtnLive" class="nav-item w-full flex items-center justify-between px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition-all" data-id="live">
                            <div class="flex items-center gap-3">

                                <span class="text-sm font-medium">Live Now</span>

                            <span id="sideTallyLive" class="bg-red-600/20 text-red-400 px-2 py-0.5 rounded-md text-xs font-bold min-w-[24px] text-center">0</span>

            <div class="p-3 lg:p-4 flex items-center justify-between border-b border-white/5 glass flex-shrink-0">

                </div>
                
                <div id="modalSidebarPanel" class="w-full lg:w-80 bg-white/[0.02] border-t lg:border-t-0 lg:border-l border-white/5 p-4 lg:p-5 flex flex-col flex-shrink-0 lg:flex-shrink overflow-hidden min-h-[220px] lg:min-h-0">
                    <p id="modalSidebarTitle" class="text-[10px] font-black uppercase tracking-widest text-red-500 mb-3 flex items-center gap-2 flex-shrink-0">
                        Other Channels

                    <div id="modalLiveList" class="space-y-3 overflow-y-auto no-scrollbar flex-1 pb-4"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="w-full glass border-t border-white/5 flex-shrink-0 py-4 px-6 text-center text-xs text-gray-500 text-gray-400">
        &copy; 2026 hc Sports Hub. All Rights Reserved.
    </footer>

    <div id="sports-toast-container"></div>

    <script>
        // Replace with your generated VAPID public key
        const VAPID_PUBLIC_KEY = 'YOUR_PUBLIC_VAPID_KEY_HERE';

        // Global State Management Engine
        let espnScoresCache = {};
        let lastLoggedPlays = {};
        let currentFilter = 'live'; // 'live' or 'all'
        let selectedSportKey = 'all';

        let notifiedFinishedMatches = new Set(
            JSON.parse(localStorage.getItem('notified_finished_matches') || '[]')
        );

        const sportsToFetch = [
            { sport: 'basketball', league: 'nba' },
            { sport: 'basketball', league: 'wnba' },
            { sport: 'football', league: 'nfl' },
            { sport: 'baseball', league: 'mlb' },
            { sport: 'hockey', league: 'nhl' },
            { sport: 'soccer', league: 'eng.1' },
            { sport: 'soccer', league: 'fifa.world' },
            { sport: 'mma', league: 'ufc' }
        ];

        const leagueConfigs = {
            'eng.1': { iconKey: 'soccer', label: 'Premier League', sportKey: 'soccer', fa: 'fa-solid fa-futbol' },
            'fifa.world': { iconKey: 'soccer', label: 'FIFA World Cup', sportKey: 'soccer', fa: 'fa-solid fa-globe' },
            'nba': { iconKey: 'basketball', label: 'NBA', sportKey: 'basketball', fa: 'fa-solid fa-basketball' },
            'wnba': { iconKey: 'basketball', label: 'WNBA', sportKey: 'basketball', fa: 'fa-solid fa-basketball' },
            'nfl': { iconKey: 'football', label: 'NFL', sportKey: 'football', fa: 'fa-solid fa-football' },
            'mlb': { iconKey: 'baseball', label: 'MLB', sportKey: 'baseball', fa: 'fa-solid fa-baseball-bat-ball' },
            'nhl': { iconKey: 'hockey', label: 'NHL', sportKey: 'hockey', fa: 'fa-solid fa-hockey-puck' },
            'ufc': { iconKey: 'mma', label: 'UFC', sportKey: 'mma', fa: 'fa-solid fa-hand-fist' }
        };

        // UI Initialization Helpers
        function initAppLayout() {
            updateClock();
            setInterval(updateClock, 1000);
            renderCategoryControls();
            renderAlertToggles();
            setupDOMEventListeners();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Web Push Registration & Subscription Subsystem
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        async function initPushNotifications() {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                console.log('Push alerts not supported natively on this browser layout.');
                return;
            }
            try {
                const registration = await navigator.serviceWorker.register('/sw.js');
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') return;

                let subscription = await registration.pushManager.getSubscription();
                if (!subscription) {
                    subscription = await registration.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                    });
                }
                // Dispatches directly to Netlify serverless execution directory
                await fetch('/.netlify/functions/save-subscription', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(subscription)
                });
            } catch (err) {
                console.warn('Subscription routing skipped:', err);
            }
        }

        function broadcastNativeSystemPush(title, body, iconUrl, tagKey) {
            fetch('/.netlify/functions/send-push', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    payload: { title, body, icon: iconUrl, tag: tagKey, url: window.location.origin },
                    subscriptions: [] // Fed via Database layout internally within Netlify function
                })
            }).catch(() => {});
        }

        // DOM Rendering Mechanics
        function renderCategoryControls() {
            const container = document.getElementById('sidebarSports');
            let html = `<button class="sport-filter-btn w-full text-left flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all bg-white/5 text-white font-semibold text-sm" data-sport="all">
                <i class="fa-solid fa-layer-group w-5"></i><span>All Sports</span>
            </button>`;

            const uniqueSports = [...new Set(Object.values(leagueConfigs).map(c => c.sportKey))];
            uniqueSports.forEach(sport => {
                const conf = Object.values(leagueConfigs).find(c => c.sportKey === sport);
                html += `<button class="sport-filter-btn w-full text-left flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all text-gray-400 hover:bg-white/5 text-sm" data-sport="${sport}">
                    <i class="${conf.fa} w-5"></i><span class="capitalize">${sport}</span>
                </button>`;
            });
            container.innerHTML = html;
        }

        function renderAlertToggles() {
            const container = document.getElementById('notificationControls');
            const uniqueSports = [...new Set(Object.values(leagueConfigs).map(c => c.sportKey))];
            let html = "";

            uniqueSports.forEach(sport => {
                const isChecked = localStorage.getItem(`notify_${sport}`) !== 'false';
                html += `
                <div class="flex items-center justify-between">
                    <span class="text-xs text-gray-300 capitalize flex items-center gap-2">
                        <i class="${Object.values(leagueConfigs).find(c => c.sportKey === sport).fa} text-[10px] text-gray-500"></i> ${sport} Alerts
                    </span>
                    <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="${sport}" id="toggle_${sport}" ${isChecked ? 'checked' : ''} class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-transparent appearance-none cursor-pointer focus:outline-none"/>
                        <label for="toggle_${sport}" class="toggle-label block overflow-hidden h-5 rounded-full bg-white/10 cursor-pointer"></label>
                    </div>
                </div>`;
            });
            container.innerHTML = html;

            uniqueSports.forEach(sport => {
                document.getElementById(`toggle_${sport}`).addEventListener('change', (e) => {
                    localStorage.setItem(`notify_${sport}`, e.target.checked);
                    if (e.target.checked) initPushNotifications();
                });
            });
        }

        function setupDOMEventListeners() {
            // Layout View Controls
            const filterActions = (id) => {
                currentFilter = id;
                document.querySelectorAll('[data-id]').forEach(btn => {
                    if (btn.getAttribute('data-id') === id) {
                        btn.classList.add('bg-red-600', 'text-white');
                        btn.classList.remove('text-gray-400', 'hover:bg-white/5');
                    } else {
                        btn.classList.remove('bg-red-600', 'text-white');
                        btn.classList.add('text-gray-400', 'hover:bg-white/5');
                    }
                });
                document.getElementById('pageTitle').innerText = `${id === 'live' ? 'Live' : 'Upcoming'} Matches`;
                buildDisplayGrid();
            };

            document.querySelectorAll('[data-id]').forEach(b => b.addEventListener('click', () => filterActions(b.getAttribute('data-id'))));

            document.getElementById('sidebarSports').addEventListener('click', (e) => {
                const btn = e.target.closest('.sport-filter-btn');
                if (!btn) return;
                document.querySelectorAll('.sport-filter-btn').forEach(b => b.classList.remove('bg-white/5', 'text-white', 'font-semibold'));
                document.querySelectorAll('.sport-filter-btn').forEach(b => b.classList.add('text-gray-400', 'hover:bg-white/5'));
                btn.classList.add('bg-white/5', 'text-white', 'font-semibold');
                selectedSportKey = btn.getAttribute('data-sport');
                buildDisplayGrid();
            });

            // Search
            document.getElementById('searchInput').addEventListener('input', buildDisplayGrid);

            // Responsive Navigation Layout
            document.getElementById('menuBtn').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('-translate-x-full');
            });

            // Video Overlay Controllers
            document.getElementById('closePlayerBtn').addEventListener('click', () => {
                document.getElementById('playerOverlay').classList.add('hidden');
                document.getElementById('videoContainer').innerHTML = "";
            });
        }

        function buildDisplayGrid() {
            const grid = document.getElementById('matchesGrid');
            const emptyState = document.getElementById('emptyState');
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            
            let html = "";
            let matchCount = 0;
            let liveTally = 0;
            let upcomingTally = 0;

            for (let key in espnScoresCache) {
                const game = espnScoresCache[key];
                const [homeTeam, awayTeam] = key.split('_vs_');
                
                if (game.isLive) liveTally++;
                else if (!game.isFinal) upcomingTally++;

                // State Filters
                if (currentFilter === 'live' && !game.isLive) continue;
                if (currentFilter === 'all' && game.isLive) continue;

                // Category Search Queries
                if (selectedSportKey !== 'all') {
                    const matchLeague = Object.keys(leagueConfigs).find(lKey => key.includes(lKey) || espnScoresCache[key].leagueSymbol === lKey);
                    if (matchLeague && leagueConfigs[matchLeague]?.sportKey !== selectedSportKey) continue;
                }

                if (searchVal && !homeTeam.includes(searchVal) && !awayTeam.includes(searchVal)) continue;

                matchCount++;
                html += `
                <div class="match-card rounded-2xl p-5 flex flex-col justify-between cursor-pointer relative overflow-hidden" onclick="launchStream('${key}')">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-[10px] tracking-widest font-black uppercase text-gray-500">${game.clock || 'Scheduled'}</span>
                        ${game.isLive ? '<span class="flex h-2 w-2 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span></span>' : ''}
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <span class="font-bold text-sm capitalize">${awayTeam}</span>
                            <span class="text-sm font-black text-right">${game.awayScore}</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="font-bold text-sm capitalize">${homeTeam}</span>
                            <span class="text-sm font-black text-right">${game.homeScore}</span>
                        </div>
                    </div>
                    ${game.baseballDetails ? `
                    <div class="mt-4 pt-3 border-t border-white/5 flex items-center justify-between text-[11px] text-gray-400">
                        <span>Outs: ${game.baseballDetails.outs}</span>
                        <span>Count: ${game.baseballDetails.balls}-${game.baseballDetails.strikes}</span>
                    </div>` : ''}
                </div>`;
            }

            // Sync Header Tallies
            document.getElementById('topTallyLive').innerText = liveTally;
            document.getElementById('sideTallyLive').innerText = liveTally;
            document.getElementById('topTallyUpcoming').innerText = upcomingTally;
            document.getElementById('sideTallyUpcoming').innerText = upcomingTally;

            if (matchCount === 0) {
                grid.innerHTML = "";
                emptyState.classList.remove('hidden');
            } else {
                grid.innerHTML = html;
                emptyState.classList.add('hidden');
            }
        }

        window.launchStream = function(matchKey) {
            const game = espnScoresCache[matchKey];
            if (!game) return;
            document.getElementById('streamTitle').innerText = matchKey.replace(/_/g, ' ').toUpperCase();
            document.getElementById('videoContainer').innerHTML = `<div class="w-full h-full flex items-center justify-center text-gray-500 text-sm p-8 text-center bg-zinc-900/40">No media streams are attached to this prototype pipeline event dashboard.</div>`;
            document.getElementById('playerOverlay').classList.remove('hidden');
        };

        // Memory Flush Routine
        export function flushEspnTransientMemory() {
            const finalGamesBackup = {};
            for (let key in espnScoresCache) {
                if (espnScoresCache[key].isFinal) {
                    finalGamesBackup[key] = espnScoresCache[key];
                }
            }
            espnScoresCache = finalGamesBackup;
            lastLoggedPlays = {};
            buildDisplayGrid();
        }

        // ESPN Core Helpers & Score Resolvers
        export function findEspnScore(homeName, awayName) {
            if (!homeName || !awayName) return null;
            const h = homeName.toLowerCase().replace(/[\s.-]/g, '').replace(/w$/, '');
            const a = awayName.toLowerCase().replace(/[\s.-]/g, '').replace(/w$/, '');
            for (let key in espnScoresCache) {
                const [espnHome, espnAway] = key.split('_vs_');
                const eh = espnHome.replace(/[\s.-]/g, '').replace(/w$/, '');
                const ea = espnAway.replace(/[\s.-]/g, '').replace(/w$/, '');
                if ((h.includes(eh) || eh.includes(h)) && (a.includes(ea) || ea.includes(a))) {
                    return espnScoresCache[key];
                }
            }
            return null;
        }

        export function parseBaseballScoringManner(text, runsDelta) {
            if (!text) return runsDelta > 0 ? `+${runsDelta} Run Scored` : "Run Scored";
            const lowerText = text.toLowerCase();
            let manner = "";
            let scorerInfo = "";

            const matchBatter = text.match(/^([A-Za-z.\s\-]+?)\s+(?:homers|hits|singles|doubles|triples|walks|grounds|flies)/i);
            if (matchBatter && matchBatter[1]) {
                scorerInfo = matchBatter[1].trim() + " ";
            }

            if (lowerText.includes("grand slam") || runsDelta === 4) {
                manner = `${scorerInfo}GRAND SLAM`;
            } else if (lowerText.includes("home run") || lowerText.includes("homers") || lowerText.includes("homered")) {
                manner = `${scorerInfo}HOME RUN`;
            } else if (lowerText.includes("double")) {
                manner = `${scorerInfo}Double`;
            } else if (lowerText.includes("triple")) {
                manner = `${scorerInfo}Triple`;
            } else if (lowerText.includes("single")) {
                manner = `${scorerInfo}Single`;
            } else if (lowerText.includes("walk")) {
                manner = `${scorerInfo}Walk`;
            } else if (lowerText.includes("sacrifice fly") || lowerText.includes("sac fly")) {
                manner = `${scorerInfo}Sac Fly`;
            } else {
                manner = `${scorerInfo}Scoring Play`;
            }

            return `${runsDelta} Run ${manner}`;
        }

        // DOM Local Notification Engine
        function triggerScoringToast(league, clock, home, homeScore, away, awayScore, message, logo) {
            const container = document.getElementById('sports-toast-container');
            const id = 'toast_' + Math.random().toString(36).substr(2, 9);
            const html = `
            <div id="${id}" class="toast-avatar glass">
                <div class="toast-icon-wrapper">
                    ${logo ? `<img src="${logo}" class="w-6 h-6 object-contain" />` : `<i class="${leagueConfigs[league]?.fa || 'fa-solid fa-bell'}"></i>`}
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-black text-red-500 uppercase tracking-wider mb-0.5">${leagueConfigs[league]?.label || 'Score Update'}</p>
                    <p class="text-xs font-bold text-white truncate">${away} ${awayScore} @ ${home} ${homeScore}</p>
                    <p class="text-[11px] text-gray-400 truncate mt-0.5">${message} [${clock}]</p>
                </div>
                <div class="toast-dismiss-btn" onclick="document.getElementById('${id}').remove()">&times;</div>
                <div class="toast-progress-bar"></div>
            </div>`;
            container.insertAdjacentHTML('beforeend', html);
            setTimeout(() => { const el = document.getElementById(id); if(el) el.remove(); }, 10000);
        }

        function triggerMatchFinishedToast(league, home, away, homeScore, awayScore) {
            triggerScoringToast(league, 'FINAL', home, homeScore, away, awayScore, 'Game Completed Finished', null);
        }

        function getTeamSuffix(name) {
            if (!name) return "";
            const words = name.split(" ");
            return words[words.length - 1];
        }

        function checkForFootballToasts(matchKey, competition, prev, currentHome, currentAway, clock) {
            // Simplified handler logic for internal structural evaluation changes
            if (prev.homeScore !== currentHome || prev.awayScore !== currentAway) {
                const text = competition.situation?.lastPlay?.text || "Football Score Action Saved";
                triggerScoringToast('nfl', clock, matchKey.split('_vs_')[0], currentHome, matchKey.split('_vs_')[1], currentAway, text, null);
            }
        }

        function getSubscribedTeams() {
            return []; // Returns explicit global array tracking options if customized by views
        }

        // External Synchronization Orchestrator
        async function fetchEspnScores(isInitialLoad = false) {
            const dependencies = { getSubscribedTeams, getTeamSuffix, checkForFootballToasts, triggerMatchFinishedToast, triggerScoringToast };

            for (const item of sportsToFetch) {
                try {
                    const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${item.sport}/${item.league}/scoreboard`);
                    if (!res.ok) continue;
                    const data = await res.json();
                    
                    if (data.events) {
                        data.events.forEach(event => {
                            const competition = event.competitions?.[0];
                            if (!competition) return;

                            const homeTeam = competition.competitors.find(c => c.homeAway === 'home');
                            const awayTeam = competition.competitors.find(c => c.homeAway === 'away');
                            const matchKey = `${homeTeam.team.name.toLowerCase()}_vs_${awayTeam.team.name.toLowerCase()}`;
                            
                            const parsedHomeScore = parseInt(homeTeam.score) || 0;
                            const parsedAwayScore = parseInt(awayTeam.score) || 0;
                            const clockInfo = event.status.type.detail || '';
                            const isFinal = event.status.type.state === 'post';

                            let baseballData = null;
                            let footballData = null;

                            if (item.league === 'mlb') {
                                const sit = competition.situation || {};
                                const homeRecordObj = homeTeam.records?.find(r => r.type === 'total') || homeTeam.records?.[0];
                                const awayRecordObj = awayTeam.records?.find(r => r.type === 'total') || awayTeam.records?.[0];
                                const rawBatter = sit.batter || sit.currentBatter || {};
                                const rawPitcher = sit.pitcher || sit.currentPitcher || {};
                                let derivedBatterStats = rawBatter.summary || rawBatter.displayValue || '0-0';
                                
                                if (derivedBatterStats === '0-0' && rawBatter.athlete?.id) {
                                    const activeId = rawBatter.athlete.id;
                                    let foundStat = null;
                                    competition.competitors.forEach(comp => {
                                        if (comp.linescores) {
                                            comp.linescores.forEach(ls => {
                                                if (ls.athletes) {
                                                    const match = ls.athletes.find(a => a.athlete?.id === activeId);
                                                    if (match && match.stats) {
                                                        foundStat = match.stats.find(s => s.name === 'statsSummary' || s.name === 'summary')?.value || match.displayValue;
                                                    }
                                                }
                                            });
                                        }
                                    });
                                    if (foundStat) derivedBatterStats = foundStat;
                                }
                                
                                baseballData = {
                                    balls: sit.balls ?? 0,
                                    strikes: sit.strikes ?? 0,
                                    outs: sit.outs ?? 0,
                                    onFirst: !!sit.onFirst,
                                    onSecond: !!sit.onSecond,
                                    onThird: !!sit.onThird,
                                    currentBatter: rawBatter.athlete?.displayName || 'Batter',
                                    currentBatterStats: derivedBatterStats,
                                    currentPitcher: rawPitcher.athlete?.displayName || 'Pitcher',
                                    lastPlayText: sit.lastPlay?.text || '',
                                    homeRecord: homeRecordObj?.summary || '0-0',
                                    awayRecord: awayRecordObj?.summary || '0-0'
                                };
                            }

                            if (item.league === 'nfl') {
                                const sit = competition.situation;
                                footballData = {
                                    downAndDistance: sit?.downDistanceText || 'N/A',
                                    quarter: event.status.period || 1,
                                    gameClock: event.status.displayClock || '0:00',
                                    possession: sit?.possession || null,
                                    homeTimeouts: homeTeam.timeouts || 3,
                                    awayTimeouts: awayTeam.timeouts || 3,
                                    lastPlayText: sit?.lastPlay?.text || '',
                                    scoringPlays: competition.scoringPlays?.map(p => ({
                                        text: p.text,
                                        score: p.awayScore + "-" + p.homeScore,
                                        period: p.period?.number
                                     })) || []
                                };
                            }

                            if (isFinal && !notifiedFinishedMatches.has(matchKey)) {
                                notifiedFinishedMatches.add(matchKey);
                                localStorage.setItem('notified_finished_matches', JSON.stringify(Array.from(notifiedFinishedMatches)));
                                
                                if (!isInitialLoad) {
                                    const associatedSport = leagueConfigs[item.league]?.sportKey || 'bell';
                                    const alertsAllowed = localStorage.getItem(`notify_${associatedSport}`) !== 'false';
                                    
                                    const followedTeams = getSubscribedTeams();
                                    let isFinishedMatchTracked = true;
                                    if (item.league === 'nfl' && followedTeams.length > 0) {
                                        const matchesHome = followedTeams.some(id => homeTeam.team.name.toLowerCase().includes(id.replace(' nfl', '')));
                                        const matchesAway = followedTeams.some(id => awayTeam.team.name.toLowerCase().includes(id.replace(' nfl', '')));
                                        if (!matchesHome && !matchesAway) isFinishedMatchTracked = false;
                                    }

                                    const isStuckKnicksSpurs = matchKey.includes('knicks') && matchKey.includes('spurs');
                                    const eventDate = event.date ? new Date(event.date) : null;
                                    const isOldGame = eventDate ? (new Date() - eventDate > 2 * 24 * 60 * 60 * 1000) : false;

                                    if (alertsAllowed && isFinishedMatchTracked && !isStuckKnicksSpurs && !isOldGame) {
                                        dependencies.triggerMatchFinishedToast(item.league, homeTeam.team.name, awayTeam.team.name, parsedHomeScore, parsedAwayScore);
                                        broadcastNativeSystemPush(`${homeTeam.team.name} vs ${awayTeam.team.name}`, `Final: ${parsedHomeScore} - ${parsedAwayScore}`, homeTeam.team.logo, matchKey);
                                    }
                                }
                            }

                            if (espnScoresCache[matchKey]) {
                                const previousScore = espnScoresCache[matchKey];
                                if (previousScore.isFinal || isFinal) {
                                    espnScoresCache[matchKey] = {
                                        homeScore: parsedHomeScore,
                                        awayScore: parsedAwayScore,
                                        clock: clockInfo,
                                        isLive: false,
                                        isFinal: true,
                                        rawStatus: competition.status?.type?.name || '',
                                        baseballDetails: baseballData,
                                        footballDetails: footballData,
                                        triggeredTwoMin: true,
                                        leagueSymbol: item.league
                                    };
                                    return; 
                                }

                                if (!isInitialLoad) {
                                    if (item.league === 'nfl' && previousScore.isLive) {
                                        dependencies.checkForFootballToasts(matchKey, competition, previousScore, parsedHomeScore, parsedAwayScore, clockInfo);
                                    } else if (previousScore.isLive && (previousScore.homeScore !== parsedHomeScore || previousScore.awayScore !== parsedAwayScore)) {
                                        const associatedSport = leagueConfigs[item.league]?.sportKey;
                                        const alertsAllowed = localStorage.getItem(`notify_${associatedSport}`) !== 'false';
                                        
                                        if (alertsAllowed) {
                                            let summary = "Score Updated";
                                            let scoringTeamLogo = null;

                                            if (item.league === 'mlb') {
                                                const delta = Math.abs((parsedHomeScore + parsedAwayScore) - (previousScore.homeScore + previousScore.awayScore)) || 1;
                                                summary = parseBaseballScoringManner(competition.situation?.lastPlay?.text || '', delta);
                                                scoringTeamLogo = previousScore.homeScore !== parsedHomeScore ? homeTeam.team.logo : awayTeam.team.logo;
                                            } else {
                                                let basicTeamContext = "";
                                                if (previousScore.homeScore !== parsedHomeScore) {
                                                    basicTeamContext = getTeamSuffix(homeTeam.team.name).toUpperCase();
                                                    scoringTeamLogo = homeTeam.team.logo;
                                                } else {
                                                    basicTeamContext = getTeamSuffix(awayTeam.team.name).toUpperCase();
                                                    scoringTeamLogo = awayTeam.team.logo;
                                                }
                                                summary = `${basicTeamContext} SCORED`;
                                            }
                                            dependencies.triggerScoringToast(item.league, clockInfo, homeTeam.team.name, parsedHomeScore, awayTeam.team.name, parsedAwayScore, summary, scoringTeamLogo);
                                            broadcastNativeSystemPush(`${awayTeam.team.name} @ ${homeTeam.team.name}`, `[${clockInfo}] ${summary} (${parsedAwayScore}-${parsedHomeScore})`, scoringTeamLogo, matchKey);
                                        }
                                    }
                                }
                            }

                            espnScoresCache[matchKey] = {
                                homeScore: parsedHomeScore,
                                awayScore: parsedAwayScore,
                                clock: clockInfo,
                                isLive: event.status.type.state === 'in',
                                isFinal: isFinal,
                                rawStatus: competition.status?.type?.name || '',
                                baseballDetails: baseballData,
                                footballDetails: footballData,
                                triggeredTwoMin: espnScoresCache[matchKey]?.triggeredTwoMin || false,
                                leagueSymbol: item.league
                            };
                        });
                    }
                } catch (e) {
                    console.error("Fetch Execution Error Pipeline:", e);
                }
            }
            buildDisplayGrid();
        }

        // Runtime Bootstrapper Engine Execution Loop
        document.addEventListener('DOMContentLoaded', async () => {
            initAppLayout();
            // Perform Initial Sync Data Population pass
            await fetchEspnScores(true);
            // Engage automated system runtime pooling loop intervals
            setInterval(() => fetchEspnScores(false), 15000);
        });
    </script>
