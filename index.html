<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hc | Sports Dashboard</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="hc Scoreboard">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100;400;700;900&display=swap');
        :root { --bg-dark: #141515; }
        body { font-family: 'Poppins', sans-serif !important; background-color: var(--bg-dark); color: #f3f4f6; overflow-x: hidden; }
        .match-card { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass { background: rgba(10, 10, 12, 0.9) !important; border-color: rgba(255, 255, 255, 0.08) !important; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="selection:bg-red-600 selection:text-white min-h-screen flex flex-col">

    <nav class="w-full h-16 glass border-b px-6 flex items-center justify-between sticky top-0 z-[60]">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded flex items-center justify-center shadow-lg shadow-red-600/20"><i class="fa-solid fa-play text-white text-sm"></i></div>
            <span class="text-xl font-light tracking-tight">hc | <b class="font-black">SCOREBOARD</b></span>
        </div>
    </nav>

    <main class="flex-1 p-6 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-6">
        <button id="btn-sim">Test Alert</button>
        
        <section class="space-y-6">
            <div class="glass border rounded-2xl p-4 flex items-center justify-between">
                <div>
                    <h2 class="text-xs font-bold text-gray-300">System Alerts</h2>
                    <p class="text-[11px] text-gray-500">Enable local game-change banners</p>
                </div>
                <input type="checkbox" id="masterAlertToggle" class="w-4 h-4 accent-red-600">
            </div>

            <div class="glass-card p-4 rounded-2xl">
                <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3">Select League</h3>
                <div class="grid grid-cols-3 gap-2">
                    <button id="btn-nfl" class="league-btn py-2 text-xs font-bold rounded-xl bg-red-600 text-white">NFL</button>
                    <button id="btn-mlb" class="league-btn py-2 text-xs font-bold rounded-xl bg-white/5 text-gray-400 hover:bg-white/10">MLB</button>
                    <button id="btn-nba" class="league-btn py-2 text-xs font-bold rounded-xl bg-white/5 text-gray-400 hover:bg-white/10">NBA</button>
                </div>
            </div>

            <div class="glass-card p-4 rounded-2xl">
                <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3">Tracked Teams</h3>
                <input type="text" id="teamSearchInput" placeholder="Press Enter to add (e.g., Cowboys)" class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-red-600 mb-3">
                <div id="trackedTeamsList" class="flex flex-wrap gap-2 max-h-40 overflow-y-auto"></div>
                <p class="text-[10px] text-gray-500 mt-2">Leave blank to watch all games</p>
            </div>
        </section>

        <section class="lg:col-span-2 space-y-4">
            <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400">Live & Scheduled Updates</h3>
            <div id="scoreboardGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>
    </main>

    <script type="module" src="./app.js"></script>
</body>
</html>
