<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Alert Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #111213; color: #f3f4f6; font-family: sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="p-4 max-w-5xl mx-auto">

    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 pb-6 border-b border-white/10">
        <div>
            <h1 class="text-2xl font-black tracking-tight text-white">SPORTS ENGINE</h1>
            <p class="text-xs text-gray-400">Live ESPN tracking with personalized team targeting</p>
        </div>
        <div class="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-xl border border-white/5">
            <span class="text-xs font-semibold text-gray-300">Master Alerts Toggle</span>
            <input type="checkbox" id="masterAlertToggle" class="w-4 h-4 accent-red-600">
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <section class="space-y-6">
            <div class="glass-card p-4 rounded-2xl">
                <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3">1. Select League</h3>
                <div class="grid grid-cols-3 gap-2">
                    <button id="btn-nfl" class="league-btn py-2 text-xs font-bold rounded-xl bg-red-600 text-white">NFL</button>
                    <button id="btn-mlb" class="league-btn py-2 text-xs font-bold rounded-xl bg-white/5 text-gray-400 hover:bg-white/10">MLB</button>
                    <button id="btn-nba" class="league-btn py-2 text-xs font-bold rounded-xl bg-white/5 text-gray-400 hover:bg-white/10">NBA</button>
                </div>
            </div>

            <div class="glass-card p-4 rounded-2xl">
                <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3">2. Tracked Teams</h3>
                <input type="text" id="teamSearchInput" placeholder="Type team name (e.g., Giants)..." class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-red-600 mb-3">
                <div id="trackedTeamsList" class="flex flex-wrap gap-2 max-h-40 overflow-y-auto">
                    </div>
            </div>
        </section>

        <main class="lg:col-span-2 space-y-4">
            <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400">Live & Scheduled Matchups</h3>
            <div id="scoreboardGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </main>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
