<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hc | Sports Scoreboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100;400;700;900&display=swap');
        :root { --bg-dark: #141515; --accent: #dc2626; }
        body { font-family: 'Poppins', sans-serif !important; background-color: var(--bg-dark); color: #f3f4f6; overflow-x: hidden; }
        .match-card { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass { background: rgba(10, 10, 12, 0.9) !important; border-color: rgba(255, 255, 255, 0.08) !important; }
        #sports-toast-container { position: fixed; top: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 16px; max-width: 420px; width: calc(100% - 48px); }
        .toast-avatar { padding: 18px; color: #ffffff; display: flex; align-items: center; gap: 16px; position: relative; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .toast-icon-wrapper { width: 42px; height: 42px; border-radius: 12px; background: rgba(220, 38, 38, 0.15); border: 1px solid rgba(220, 38, 38, 0.3); color: #ef4444; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .toast-dismiss-btn { position: absolute; top: 12px; right: 14px; cursor: pointer; color: #9ca3af; }
        .toggle-checkbox:checked + .toggle-label { background-color: #ef4444; }
        .toggle-checkbox:checked + .toggle-label .toggle-dot { transform: translateX(100%); }
    </style>
</head>
<body class="selection:bg-red-600 selection:text-white min-h-screen flex flex-col">

    <nav class="w-full h-16 glass border-b px-6 flex items-center justify-between sticky top-0 z-[60]">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded flex items-center justify-center shadow-lg shadow-red-600/20"><i class="fa-solid fa-play text-white text-sm"></i></div>
            <span class="text-xl font-light tracking-tight">hc | <b class="font-black">SCOREBOARD</b></span>
        </div>

        <div class="flex-1 max-w-sm mx-4 relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-magnifying-glass text-xs"></i></span>
            <input type="text" id="searchInput" placeholder="Search team..." class="w-full bg-white/5 border border-white/10 rounded-full py-1.5 pl-9 pr-4 text-sm text-white focus:outline-none focus:border-red-600">
        </div>

        <div class="flex items-center gap-4">
            <button id="topBtnLive" class="px-4 py-1.5 rounded-full text-xs font-bold bg-red-600 text-white">Live Now</button>
            <button id="topBtnAll" class="px-4 py-1.5 rounded-full text-xs font-bold text-gray-400 hover:bg-white/5">Upcoming</button>
        </div>
    </nav>

    <main class="flex-1 p-6 max-w-7xl mx-auto w-full">
        <div class="glass border rounded-2xl p-4 mb-6 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>
                <h2 class="text-sm font-bold text-gray-300">Live Web Push Subscriptions</h2>
                <p class="text-xs text-gray-500">Toggle system game activity alerts directly to iOS & Android native center layout.</p>
            </div>
            <div class="flex items-center">
                <span class="text-xs text-gray-400 mr-3 font-medium">System Push Alerts</span>
                <div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" id="globalPushToggle" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-transparent appearance-none cursor-pointer focus:outline-none"/>
                    <label for="globalPushToggle" class="toggle-label block overflow-hidden h-5 rounded-full bg-white/10 cursor-pointer"></label>
                </div>
            </div>
        </div>

        <div id="matchesGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
    </main>

    <div id="sports-toast-container"></div>

    <script type="module" src="./app.js"></script>




    <button id="testBtnMock" class="px-4 py-1.5 rounded-full text-xs font-bold bg-amber-500 text-black">Test Mock Game</button>

</body>
</html>
